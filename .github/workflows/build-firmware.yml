name: Creare Magicae Ordinationis Fabrica
# above means Create (infinitive) a magical organization (or arrangement literally) device. I'm a bit rusty in Latin so this may be off

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  creare_magicae_ordinationis_fabrica:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Code/PocketMage_V3

    steps:
      - name: Conjure the Repository
        uses: actions/checkout@v4

      - name: Prepare the Python Cauldron
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Ancient Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Summon PlatformIO
        run: pip install -U platformio

      - name: Forge the PocketMage Spells
        run: |
          # Build both the Production and Beta environments
          pio run -e PM_PRODUCTION -e PM_BETA
          
          # Create a clean release directory structure for the Web Flasher
          mkdir -p release/production
          mkdir -p release/beta
          
          # Copy Production Binaries
          cp .pio/build/PM_PRODUCTION/firmware.bin release/production/
          cp .pio/build/PM_PRODUCTION/partitions.bin release/production/
          cp .pio/build/PM_PRODUCTION/bootloader.bin release/production/
          
          # Copy Beta Binaries
          cp .pio/build/PM_BETA/firmware.bin release/beta/
          cp .pio/build/PM_BETA/partitions.bin release/beta/
          cp .pio/build/PM_BETA/bootloader.bin release/beta/

      - name: Gather the Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pocketmage-release
          path: Code/PocketMage_V3/release/
